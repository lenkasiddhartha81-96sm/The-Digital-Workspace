# Netlify Configuration File
# Deploy settings and headers for The Digital Workspace website

# Build settings
[build]
command = ""
publish = "."
functions = "netlify/functions"

# Redirects
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# 404 Redirect
[[redirects]]
from = "/404"
to = "/404.html"
status = 404

# Security Headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net www.googletagmanager.com www.google-analytics.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; connect-src 'self' api.emailjs.com www.googletagmanager.com www.google-analytics.com; img-src 'self' data: https:;"
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache Control Headers
[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000"

# Sitemap and Robots
[[headers]]
for = "/sitemap.xml"
[headers.values]
Content-Type = "application/xml"
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/robots.txt"
[headers.values]
Content-Type = "text/plain"
Cache-Control = "public, max-age=86400"

# Performance Settings
[context.production]
command = ""
publish = "."

# Preview context
[context.preview]
command = ""
publish = "."

# Draft context
[context.draft]
command = ""
publish = "."

# Environment variables (add your own here)
# [context.production.environment]
# GOOGLE_ANALYTICS_ID = "G-PLACEHOLDER"

# Functions config
[functions]
included_files = ["netlify/functions/**"]
